<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoSpark20</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f0f2f5;
}

header{
background:#0d1b3d;
padding:15px 20px;
display:flex;
align-items:center;
justify-content:space-between;
color:white;
position:sticky;
top:0;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ff9f43;
}

.search-box input{
padding:10px;
width:250px;
border:none;
border-radius:20px;
outline:none;
}

.container{
display:flex;
padding:20px;
gap:20px;
}

.sidebar{
width:20%;
background:white;
padding:20px;
border-radius:15px;
height:fit-content;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:15px 10px;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.sidebar ul li:hover{
background:#f0f2f5;
}

.feed{
width:55%;
}

.post-box{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.post-box input{
width:100%;
padding:15px;
border:none;
background:#f0f2f5;
border-radius:25px;
outline:none;
}

.post{
background:white;
border-radius:15px;
padding:20px;
margin-bottom:20px;
}

.post-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.profile{
width:45px;
height:45px;
border-radius:50%;
background:#ccc;
}

.post img{
width:100%;
border-radius:15px;
margin-top:15px;
}

.actions{
display:flex;
justify-content:space-around;
margin-top:15px;
padding-top:10px;
border-top:1px solid #ddd;
}

.actions button{
border:none;
background:none;
font-size:16px;
cursor:pointer;
}

.rightbar{
width:25%;
background:white;
padding:20px;
border-radius:15px;
height:fit-content;
}

.friend{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:15px;
}

.friend-info{
display:flex;
align-items:center;
gap:10px;
}

.add-btn{
background:#ff9f43;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

@media(max-width:900px){
.container{
flex-direction:column;
}

.sidebar,
.feed,
.rightbar{
width:100%;
}
}
</style>
</head>

<body>

<header>
<div class="logo">EchoSpark20</div>

<div class="search-box">
<input type="text" placeholder="Search EchoSpark20">
</div>
</header>

<div class="container">

<div class="sidebar">
<ul>
<li>🏠 Home</li>
<li>👥 Friends</li>
<li>🎬 Watch</li>
<li>🛒 Marketplace</li>
<li>📅 Events</li>
<li>💾 Saved</li>
<li>🎮 Gaming</li>
</ul>
</div>

<div class="feed">

<div class="post-box">
<input type="text" placeholder="What's on your mind?">
</div>

<div class="post">

<div class="post-header">
<div class="profile"></div>
<div>
<h3>Mominul Alp</h3>
<p>2h ago</p>
</div>
</div>

<p>
Welcome to EchoSpark20 🔥  
My own social media platform is now live 🚀
</p>

<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop" alt="post image">

<div class="actions">
<button>👍 Like</button>
<button>💬 Comment</button>
<button>↗ Share</button>
</div>

</div>

</div>

<div class="rightbar">

<h3>Suggested Friends</h3>
<br>

<div class="friend">
<div class="friend-info">
<div class="profile"></div>
<p>Ahmed</p>
</div>
<button class="add-btn">Add</button>
</div>

<div class="friend">
<div class="friend-info">
<div class="profile"></div>
<p>Rahim</p>
</div>
<button class="add-btn">Add</button>
</div>

<div class="friend">
<div class="friend-info">
<div class="profile"></div>
<p>Karim</p>
</div>
<button class="add-btn">Add</button>
</div>

</div>

</div>

</body>
</html>
